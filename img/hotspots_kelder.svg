<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
    
    <style>
        .hotspot {
            cursor: pointer;
            fill: transparent;
            stroke: transparent;
            transition: fill 0.2s ease;
        }
        /* Subtiele hover-indicatie zonder zichtbare lijnen. */
        .hotspot:hover {
            fill: rgba(255, 255, 255, 0.05);
        }
    </style>

    <!-- doos stapel links (grote stapel links) -->
    <polygon points="60,220 340,220 340,760 60,760" class="hotspot" onclick="window.parent.inspectObject('doos_stapel_links')" />

    <!-- doos stapel midden (naast wasmachine links) -->
    <polygon points="460,360 760,360 760,760 460,760" class="hotspot" onclick="window.parent.inspectObject('doos_stapel_midden')" />

    <!-- wasmachine -->
    <polygon points="820,300 1080,300 1080,660 820,660" class="hotspot" onclick="window.parent.inspectObject('wasmachine')" />

    <!-- doos stapel rechts (kleine stapel bij trap) -->
    <polygon points="1180,520 1380,520 1380,760 1180,760" class="hotspot" onclick="window.parent.inspectObject('doos_stapel_rechts')" />

    <!-- trap (rechtse kant) -->
    <polygon points="1460,80 1920,80 1920,1080 1460,1080" class="hotspot" onclick="window.parent.inspectObject('trap')" />

</svg>